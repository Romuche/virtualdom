<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext vs Naive — Scroll Performance Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f2f2f7;
      color: #1c1c1e;
    }

    main {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      gap: 40px;
    }

    .hero {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 15px;
      color: #636366;
      max-width: 420px;
      line-height: 1.5;
    }

    .cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 220px;
      padding: 24px 20px;
      border-radius: 16px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card.naive {
      background: #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }

    .card.virtual {
      background: #0b93f6;
      color: #fff;
      box-shadow: 0 1px 3px rgba(11,147,246,.2), 0 4px 20px rgba(11,147,246,.3);
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.55;
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .card-desc {
      font-size: 13px;
      line-height: 1.5;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <h1>Pretext vs Naive</h1>
      <p class="subtitle">A scroll performance comparison — 10 000 chat messages, two rendering strategies. Open each page and try scrolling.</p>
    </div>

    <div class="cards">
      <a class="card naive" href="naive.html">
        <span class="card-label">Baseline</span>
        <span class="card-title">Naive rendering</span>
        <span class="card-desc">All 10 000 DOM nodes inserted at once.</span>
      </a>
      <a class="card virtual" href="virtual.html">
        <span class="card-label">Optimised</span>
        <span class="card-title">Virtual list</span>
        <span class="card-desc">Only ~30 nodes in the DOM at any time, heights pre-computed with Pretext.</span>
      </a>
    </div>
  </main>
</body>
</html>
